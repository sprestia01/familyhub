<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Hub</title>
<style>
  :root {
    --bg: #15171c;
    --panel: #1d2027;
    --panel-line: #2b2f38;
    --text-primary: #f3f4f6;
    --text-secondary: #9499a6;
    --text-tertiary: #5d6270;
    --accent: #5b8def;
    --accent-dim: #233756;
    --accent-text: #9cc0ff;
    --done: #5fa777;
    --warn: #d9a25b;
    --font: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    padding: 20px 26px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .header-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .header-time {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .header-time .clock {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .header-time .date {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ---------- Panels ---------- */
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .panel-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---------- Main layout: calendar on the left, lists stacked on the right ---------- */
  .main-layout {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 14px;
    flex: 1 1 auto;
    min-height: 0;
  }

  .calendar-column {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .calendar-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1 1 auto;
  }

  .calendar-panel iframe {
    flex: 1 1 auto;
    width: 100%;
    min-height: 0;
    border-radius: 8px;
    background: #fff;
  }

  .lists-column {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
    overflow: hidden;
  }

  .lists-column .panel {
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .lists-column .check-list,
  .lists-column .meal-list,
  .lists-column .weather-list {
    overflow-y: auto;
  }

  .check-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow: hidden;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
  }

  .check-box {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    border: 1.5px solid var(--text-tertiary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-row.done .check-box {
    background: var(--done);
    border-color: var(--done);
  }

  .check-row.done .check-box::after {
    content: "";
    width: 6px;
    height: 3px;
    border-left: 1.5px solid #0e1a13;
    border-bottom: 1.5px solid #0e1a13;
    transform: rotate(-45deg) translate(0, -1px);
  }

  .check-row.done .check-label {
    color: var(--text-tertiary);
    text-decoration: line-through;
  }

  .meal-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }

  .meal-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .meal-row.today .meal-day,
  .meal-row.today .meal-name {
    color: var(--accent-text);
  }

  .meal-day {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    width: 32px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .meal-name {
    font-size: 12.5px;
    color: var(--text-primary);
  }

  /* ---------- Weather panel ---------- */
  .weather-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }

  .weather-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .weather-day {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    width: 32px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .weather-icon {
    font-size: 16px;
    width: 20px;
    flex-shrink: 0;
    text-align: center;
  }

  .weather-desc {
    flex: 1;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .weather-temps {
    font-size: 12.5px;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .weather-temps .high {
    color: var(--text-primary);
    font-weight: 600;
  }

  .weather-temps .low {
    color: var(--text-tertiary);
  }
</style>
</head>
<body>

  <div class="header">
    <div class="header-title">The family hub</div>
    <div class="header-time">
      <span class="clock" id="clock-time">--:--</span>
      <span class="date" id="clock-date">Loading date</span>
    </div>
  </div>

  <div class="main-layout">

    <div class="calendar-column">
      <div class="panel calendar-panel">
        <div class="panel-label">Calendar</div>
        <!--
          Connected to sprestia01@gmail.com, month view.
          To swap calendars or change view: edit the src= URL below.
          (mode=MONTH, mode=WEEK, mode=AGENDA, mode=DAY are the options.)
        -->
        <iframe
          id="calendar-frame"
          src="https://calendar.google.com/calendar/embed?src=sprestia01%40gmail.com&ctz=America%2FNew_York&mode=AGENDA"
          frameborder="0"
          scrolling="no">
        </iframe>
      </div>
    </div>

    <div class="lists-column">

      <div class="panel">
        <div class="panel-label">To-do</div>
        <div class="check-list" id="todo-list"></div>
      </div>

      <div class="panel">
        <div class="panel-label">Grocery list</div>
        <div class="check-list" id="grocery-list"></div>
      </div>

      <div class="panel">
        <div class="panel-label">Meal plan</div>
        <div class="meal-list" id="meal-list"></div>
      </div>

      <div class="panel">
        <div class="panel-label">Weather</div>
        <div class="weather-list" id="weather-list"></div>
      </div>

    </div>

  </div>

<script>
/* =========================================================================
   EDIT THIS SECTION to personalize the dashboard.
   No coding knowledge needed beyond editing the lists below.
   ========================================================================= */

/* =========================================================================
   Data now lives in a shared Google Sheet, not in this file.
   Edit the lists from your phone using the Google Sheets app — changes
   show up here automatically on the next refresh (no file editing needed).

   ONE-TIME SETUP:
   1. Create a Google Sheet with three tabs named exactly: todo, groceries, meals
      - "todo" tab columns:      A = text          B = done (TRUE or FALSE)
      - "groceries" tab columns: A = text
      - "meals" tab columns:     A = day (Mon/Tue/Wed/Thu/Fri/Sat/Sun)  B = meal
   2. File > Share > Publish to web > select "Entire document" >
      publish as "Comma-separated values (.csv)"
        (Publishing to web is what makes the CSV link work without login.
         This makes the sheet's contents viewable by anyone with the exact
         link below — fine for grocery/to-do lists, just don't put anything
         sensitive in this sheet.)
   3. For EACH tab, get its own CSV link:
      File > Share > Publish to web > in the dropdown choose the specific
      sheet tab (not "Entire document") > "Comma-separated values (.csv)" >
      copy that link > paste below, replacing the matching placeholder.
   4. Each tab's CSV link differs only in its "gid=" number at the end —
      that identifies which tab it points to.
   ========================================================================= */

const SHEET_CSV_URLS = {
  todo: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7Pzpji3nmqgm23KgrUVXwzpKA15zFV4sJN3aFgQVTmJhxBaKjOqej32vgDAn2jQDU3xcIWCfiOo-V/pub?gid=0&single=true&output=csv",
  groceries: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7Pzpji3nmqgm23KgrUVXwzpKA15zFV4sJN3aFgQVTmJhxBaKjOqej32vgDAn2jQDU3xcIWCfiOo-V/pub?gid=985037357&single=true&output=csv",
  meals: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7Pzpji3nmqgm23KgrUVXwzpKA15zFV4sJN3aFgQVTmJhxBaKjOqej32vgDAn2jQDU3xcIWCfiOo-V/pub?gid=293496617&single=true&output=csv"
};

/* =========================================================================
   Weather: 3-day forecast via Open-Meteo (free, no API key required).
   Set your location's latitude/longitude below — defaults to Baltimore, MD.
   Find coordinates for any city by searching "[city name] latitude longitude".
   ========================================================================= */
const WEATHER_LOCATION = {
  latitude: 39.3637,
  longitude: -77.5499,
  label: "21755 (Jefferson, MD)"
};

/* =========================================================================
   Today's agenda panel (above, in the HTML) is a live Google Calendar embed
   connected to sprestia01@gmail.com — not driven by data in this script.
   To change calendars or view mode, edit the iframe's src= URL directly.
   The week strip and meal plan below are still manual/edit-in-place.
   ========================================================================= */

/* =========================================================================
   Below this line: rendering logic. No need to edit unless you want to
   change how things are laid out.
   ========================================================================= */

function updateClock() {
  const now = new Date();
  document.getElementById("clock-time").textContent =
    now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  document.getElementById("clock-date").textContent =
    now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
}
updateClock();
setInterval(updateClock, 30000);

function renderCheckList(containerId, items, getText, getDone) {
  const list = document.getElementById(containerId);
  list.innerHTML = "";

  items.forEach(item => {
    const text = getText(item);
    const done = getDone ? getDone(item) : false;

    const row = document.createElement("div");
    row.className = "check-row" + (done ? " done" : "");
    row.innerHTML = `
      <div class="check-box"></div>
      <div class="check-label">${escapeHtml(text)}</div>
    `;
    list.appendChild(row);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// Parses one line of CSV into an array of fields, handling quoted fields
// that may contain commas (Google Sheets quotes any field with a comma in it).
function parseCsvLine(line) {
  const fields = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (inQuotes) {
      if (char === '"' && line[i + 1] === '"') {
        current += '"';
        i++;
      } else if (char === '"') {
        inQuotes = false;
      } else {
        current += char;
      }
    } else {
      if (char === '"') {
        inQuotes = true;
      } else if (char === ",") {
        fields.push(current);
        current = "";
      } else {
        current += char;
      }
    }
  }
  fields.push(current);
  return fields;
}

function parseCsv(text) {
  return text
    .split(/\r?\n/)
    .filter(line => line.trim().length > 0)
    .map(parseCsvLine);
}

async function fetchCsv(url) {
  if (!url || url.startsWith("PASTE_")) {
    return null;
  }
  try {
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) throw new Error("Fetch failed: " + response.status);
    const text = await response.text();
    return parseCsv(text);
  } catch (err) {
    console.error("Failed to load sheet data:", url, err);
    return null;
  }
}

async function loadAndRenderTodos() {
  const rows = await fetchCsv(SHEET_CSV_URLS.todo);
  const list = document.getElementById("todo-list");

  if (!rows) {
    list.innerHTML = `<div class="check-row"><div class="check-label" style="color:var(--text-tertiary);">Connect a Google Sheet to see your to-dos here</div></div>`;
    return;
  }

  const dataRows = rows[0] && rows[0][0] && rows[0][0].toLowerCase() === "text" ? rows.slice(1) : rows;
  const items = dataRows
    .filter(r => r[0] && r[0].trim().length > 0)
    .map(r => ({ text: r[0], done: (r[1] || "").trim().toUpperCase() === "TRUE" }));

  renderCheckList("todo-list", items, t => t.text, t => t.done);
}

async function loadAndRenderGroceries() {
  const rows = await fetchCsv(SHEET_CSV_URLS.groceries);
  const list = document.getElementById("grocery-list");

  if (!rows) {
    list.innerHTML = `<div class="check-row"><div class="check-label" style="color:var(--text-tertiary);">Connect a Google Sheet to see your grocery list here</div></div>`;
    return;
  }

  const dataRows = rows[0] && rows[0][0] && rows[0][0].toLowerCase() === "text" ? rows.slice(1) : rows;
  const items = dataRows.map(r => r[0]).filter(t => t && t.trim().length > 0);

  renderCheckList("grocery-list", items, g => g, () => false);
}

async function loadAndRenderMealPlan() {
  const rows = await fetchCsv(SHEET_CSV_URLS.meals);
  const dayOrder = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const jsDay = new Date().getDay();
  const todayIndex = jsDay === 0 ? 6 : jsDay - 1;
  const list = document.getElementById("meal-list");

  if (!rows) {
    list.innerHTML = `<div class="meal-row"><div class="meal-name" style="color:var(--text-tertiary);">Connect a Google Sheet to see your meal plan here</div></div>`;
    return;
  }

  const dataRows = rows[0] && rows[0][0] && rows[0][0].toLowerCase() === "day" ? rows.slice(1) : rows;
  const mealsByDay = {};
  dataRows.forEach(r => {
    if (r[0]) mealsByDay[r[0].trim()] = r[1] || "";
  });

  list.innerHTML = "";
  dayOrder.forEach((day, i) => {
    const meal = mealsByDay[day] || "—";
    const row = document.createElement("div");
    row.className = "meal-row" + (i === todayIndex ? " today" : "");
    row.innerHTML = `
      <div class="meal-day">${day}</div>
      <div class="meal-name">${escapeHtml(meal)}</div>
    `;
    list.appendChild(row);
  });
}

// Maps Open-Meteo's numeric weather codes to a simple icon + label.
// Reference: https://open-meteo.com/en/docs (WMO weather codes)
function describeWeatherCode(code) {
  if (code === 0) return { icon: "☀", label: "Clear" };
  if (code <= 2) return { icon: "🌤", label: "Mostly clear" };
  if (code === 3) return { icon: "☁", label: "Cloudy" };
  if (code === 45 || code === 48) return { icon: "🌫", label: "Foggy" };
  if (code >= 51 && code <= 57) return { icon: "🌦", label: "Drizzle" };
  if (code >= 61 && code <= 67) return { icon: "🌧", label: "Rain" };
  if (code >= 71 && code <= 77) return { icon: "❄", label: "Snow" };
  if (code >= 80 && code <= 82) return { icon: "🌧", label: "Showers" };
  if (code >= 85 && code <= 86) return { icon: "🌨", label: "Snow showers" };
  if (code >= 95) return { icon: "⛈", label: "Thunderstorms" };
  return { icon: "•", label: "—" };
}

async function loadAndRenderWeather() {
  const list = document.getElementById("weather-list");
  const { latitude, longitude } = WEATHER_LOCATION;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=3`;

  try {
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) throw new Error("Weather fetch failed: " + response.status);
    const data = await response.json();

    const days = data.daily.time;
    const codes = data.daily.weather_code;
    const highs = data.daily.temperature_2m_max;
    const lows = data.daily.temperature_2m_min;

    list.innerHTML = "";
    days.forEach((dateStr, i) => {
      const date = new Date(dateStr + "T00:00:00");
      const dayLabel = i === 0 ? "Today" : date.toLocaleDateString([], { weekday: "short" });
      const { icon, label } = describeWeatherCode(codes[i]);

      const row = document.createElement("div");
      row.className = "weather-row";
      row.innerHTML = `
        <div class="weather-day">${escapeHtml(dayLabel)}</div>
        <div class="weather-icon">${icon}</div>
        <div class="weather-desc">${escapeHtml(label)}</div>
        <div class="weather-temps"><span class="high">${Math.round(highs[i])}°</span> <span class="low">${Math.round(lows[i])}°</span></div>
      `;
      list.appendChild(row);
    });
  } catch (err) {
    console.error("Failed to load weather:", err);
    list.innerHTML = `<div class="weather-row"><div class="weather-desc" style="color:var(--text-tertiary);">Weather unavailable</div></div>`;
  }
}

async function loadAllListData() {
  await Promise.all([
    loadAndRenderTodos(),
    loadAndRenderGroceries(),
    loadAndRenderMealPlan(),
    loadAndRenderWeather()
  ]);
}

loadAllListData();

// Refresh list data from the Sheet every 5 minutes, so edits made on a
// phone show up here without needing a full page reload.
setInterval(loadAllListData, 5 * 60 * 1000);

// Full page reload once an hour as a fallback (also keeps calendar
// iframes fresh, since iframes don't auto-refresh on their own).
setTimeout(() => location.reload(), 60 * 60 * 1000);
</script>

</body>
</html>
